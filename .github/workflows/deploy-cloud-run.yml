name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  SERVICE_NAME: naprockweb-web
  REGION: asia-southeast1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate auth configuration
        env:
          WIF_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          WIF_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          GCP_CREDENTIALS_JSON: ${{ secrets.GCP_CREDENTIALS_JSON }}
        run: |
          if [ -n "$WIF_PROVIDER" ] && [ -n "$WIF_SERVICE_ACCOUNT" ]; then
            echo "Using Workload Identity Federation"
            exit 0
          fi

          if [ -n "$GCP_CREDENTIALS_JSON" ]; then
            echo "Using service account JSON credentials"
            exit 0
          fi

          echo "No valid auth method configured."
          echo "Set either:"
          echo "1) GCP_WORKLOAD_IDENTITY_PROVIDER + GCP_SERVICE_ACCOUNT"
          echo "or"
          echo "2) GCP_CREDENTIALS_JSON"
          exit 1

      - name: Authenticate to Google Cloud (WIF)
        if: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && secrets.GCP_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Authenticate to Google Cloud (JSON key)
        if: ${{ (secrets.GCP_WORKLOAD_IDENTITY_PROVIDER == '' || secrets.GCP_SERVICE_ACCOUNT == '') && secrets.GCP_CREDENTIALS_JSON != '' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_JSON }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Cloud Run service
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --source . \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "$REGION" \
            --allow-unauthenticated \
            --set-env-vars APP_ENV=production,APP_DEBUG=false,LOG_CHANNEL=stderr,APP_URL=https://est-monitoring.online,SESSION_DRIVER=file,CACHE_STORE=file,QUEUE_CONNECTION=sync,PYTHON_API_ENABLED=false \
            --set-env-vars APP_KEY="${{ secrets.APP_KEY }}"

      - name: Show service URL
        run: |
          gcloud run services describe "$SERVICE_NAME" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "$REGION" \
            --format='value(status.url)'
