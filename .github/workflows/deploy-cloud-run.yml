name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  SERVICE_NAME: naprockweb-web
  REGION: asia-southeast1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate auth configuration
        env:
          GCP_CREDENTIALS_JSON: ${{ secrets.GCP_CREDENTIALS_JSON }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          APP_KEY: ${{ secrets.APP_KEY }}
        run: |
          if [ -z "$GCP_CREDENTIALS_JSON" ]; then
            echo "Missing required secret: GCP_CREDENTIALS_JSON"
            exit 1
          fi

          if [ -z "$GCP_PROJECT_ID" ]; then
            echo "Missing required secret: GCP_PROJECT_ID"
            exit 1
          fi

          if [ -z "$APP_KEY" ]; then
            echo "Missing required secret: APP_KEY"
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_JSON }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Cloud Run service
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --source . \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "$REGION" \
            --allow-unauthenticated \
            --set-env-vars APP_ENV=production,APP_DEBUG=false,LOG_CHANNEL=stderr,APP_URL=https://est-monitoring.online,SESSION_DRIVER=file,CACHE_STORE=file,QUEUE_CONNECTION=sync,PYTHON_API_ENABLED=false \
            --set-env-vars APP_KEY="${{ secrets.APP_KEY }}"

      - name: Show service URL
        run: |
          gcloud run services describe "$SERVICE_NAME" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "$REGION" \
            --format='value(status.url)'
